services:

  api1:
    build: .
    container_name: api1
    networks:
      - fraud-detection-network
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: 150MB

  api2:
    build: .
    container_name: api2
    networks:
      - fraud-detection-network
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: 150MB

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "9999:9999"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - fraud-detection-network
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 50MB
  
networks:
  fraud-detection-network:
    driver: bridge 
